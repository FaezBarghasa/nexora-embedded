<svg width="1050" height="600" viewBox="0 0 1050 600" xmlns="http://www.w3.org/2000/svg">
  <style>
  /* Global styles conforming to Nexora's brand guidelines */
  .card-canvas {
    fill: #0D1620; /* Surface Background */
    stroke: #1A2830; /* Border */
    stroke-width: 2.5;
    rx: 6px; /* Symmetrical crisp corners */
  }

  /* Muted background copper traces */
  .bg-trace {
    stroke: #00E5A0;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.12; /* Subtle background depth */
    fill: none;
  }

  /* Concentric circular via nodes */
  .via-outer {
    fill: #0A0E14;
    stroke: #00E5A0;
    stroke-width: 2.5;
  }
  .via-inner {
    fill: #00E5A0;
  }

  /* Active glowing traces */
  .active-trace {
    stroke: #00E5A0;
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0.85;
  }

  /* Typographical layers */
  .text-wordmark {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 900;
    font-size: 52px;
    fill: #E8F4F0; /* Sterile off-white (Unified single color) */
  }
  .text-subtitle {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    fill: #3A5048; /* Text muted */
    letter-spacing: 0.28em;
  }
  .divider-line {
    stroke: #1A2830;
    stroke-width: 1.5;
  }

  /* Corporate Details */
  .name-label {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 700;
    font-size: 34px;
    fill: #E8F4F0;
  }
  .title-label {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 13px;
    fill: #00E5A0; /* Signal green highlight */
    letter-spacing: 0.15em;
  }
  .metadata-label {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 12px;
    fill: #8AB0A0; /* Muted secondary text */
  }
  .silkscreen-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    fill: #3A5048; /* Low-priority debug label */
    letter-spacing: 0.12em;
  }
  </style>
  <rect class="card-canvas" x="1.25" y="1.25" width="1047.5" height="597.5"/>
</svg>
