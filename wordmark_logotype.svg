<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60">
  <defs>
    <style>
      .wordmark-base {
        font-family: 'IBM Plex Mono', 'Courier Prime', 'Courier New', monospace;
        font-weight: 900;
        font-size: 34px;
        fill: #E8F4F0; /* Sterile off-white - Unified single solid color */
      }
      .divider {
        stroke: #1A2830;
        stroke-width: 1.5;
      }
      .subtitle {
        font-family: 'IBM Plex Sans', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 9.5px;
        fill: #3A5048; /* Text muted */
        letter-spacing: 0.28em;
      }
    </style>
  </defs>

  <g transform="translate(10, 42)">
    <!-- Main Wordmark -->
    <text x="0" y="0" class="wordmark-base">nexora</text>

    <!-- Vertical Divider -->
    <line x1="140" y1="-26" x2="140" y2="4" class="divider" />

    <!-- Subtitle Stack -->
    <text x="155" y="-14" class="subtitle">EMBEDDED</text>
    <text x="155" y="2" class="subtitle">MEDICAL SYSTEMS</text>
  </g>
</svg>