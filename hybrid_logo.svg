<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
   <defs>
     <style>
       .trace {
         stroke: #00E5A0;
         stroke-width: 5.5;
         stroke-linecap: round;
         stroke-linejoin: round;
         fill: none;
       }
       .via-outer {
         fill: #0A0E14;
         stroke: #00E5A0;
         stroke-width: 3.5;
       }
       .via-inner {
         fill: #00E5A0;
       }
      .wordmark-base {
        font-family: 'IBM Plex Mono', 'Courier Prime', 'Courier New', monospace;
        font-weight: 900;
        font-size: 34px;
        fill: #E8F4F0;
      }
      .divider {
        stroke: #1A2830;
        stroke-width: 1.5;
      }
      .subtitle {
        font-family: 'IBM Plex Sans', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 9.5px;
        fill: #3A5048;
        letter-spacing: 0.28em;
       }
     </style>
   </defs>

  <!-- Abstract Symbol -->
  <g id="abstract_symbol" transform="translate(0, 0)">
     <g id="traces">
       <path class="trace" d="M 24 30 L 24 52 L 44 72 L 44 90" />
       <path class="trace" d="M 44 18 L 44 52 L 54 62 L 54 74" />
       <path class="trace" d="M 64 30 L 64 52" />
     </g>
     <g id="vias">
       <g transform="translate(24, 30)">
         <circle class="via-outer" r="8" />
         <circle class="via-inner" r="3" />
       </g>
       <g transform="translate(44, 18)">
         <circle class="via-outer" r="8" />
         <circle class="via-inner" r="3" />
       </g>
       <g transform="translate(64, 30)">
         <circle class="via-outer" r="8" />
         <circle class="via-inner" r="3" />
       </g>
       <g transform="translate(64, 52)">
         <circle class="via-outer" r="8" />
         <circle class="via-inner" r="3" />
       </g>
       <g transform="translate(44, 90)">
         <circle class="via-outer" r="8" />
         <circle class="via-inner" r="3" />
       </g>
     </g>
   </g>

  <!-- Wordmark -->
  <g transform="translate(120, 72)">
    <!-- Main Wordmark -->
    <text x="0" y="0" class="wordmark-base">nexora</text>

    <!-- Vertical Divider -->
    <line x1="140" y1="-26" x2="140" y2="4" class="divider" />

    <!-- Subtitle Stack -->
    <text x="155" y="-14" class="subtitle">EMBEDDED</text>
    <text x="155" y="2" class="subtitle">MEDICAL SYSTEMS</text>
  </g>
</svg>
